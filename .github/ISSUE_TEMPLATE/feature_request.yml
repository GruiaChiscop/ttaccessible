name: Feature request
description: Suggest a new feature or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: A clear description of the feature or improvement.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: What problem does it solve?
      description: Describe the situation where this would help. Concrete examples make the case stronger.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered (optional)
      description: Existing workarounds, other apps that do this, or other approaches you thought about.

  - type: textarea
    id: extra
    attributes:
      label: Additional context (optional)
      description: Mockups, screenshots, links to related discussions, etc.
